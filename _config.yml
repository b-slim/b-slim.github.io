# About — paragraphs rendered on the page (use a YAML list for multiple paragraphs)
about:
  - >
    I'm a Software Engineering Manager at LinkedIn, leading a team that designs,
    builds and operates exa-scale SQL data platforms on Trino (Presto). With
    10+ years in distributed data processing, I've shipped systems that range
    from sub-second OLAP over petabytes to SQL data-warehousing over exabytes
    of data lake.
  - >
    I'm a PMC member of <strong>Apache Druid</strong> and a committer at
    <strong>Apache Hive</strong>, with active contributions to
    <strong>Apache Calcite</strong>. I care deeply about query optimization,
    performance, and the kind of code that keeps running at 3 a.m.
  - >
    Outside of computers, you'll find me on alpine granite, on a glacier,
    or skinning up something steep.

