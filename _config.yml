# Build
markdown: kramdown
permalink: pretty
encoding: utf-8
plugins:
  - jekyll-feed
  - jekyll-github-metadata
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - node_modules
  - README.md
