# Site
name: Slim Bouguerra
title: Slim Bouguerra
tagline: "Code, climb, ski, repeat."
description: "Slim Bouguerra — distributed systems engineer working on data infrastructure. Long-time contributor to Apache Druid, Hive, and Calcite."
location: "Pacific Northwest, USA"
url: "https://b-slim.github.io"
baseurl: ""
repository: "b-slim/b-slim.github.io"
lang: en
theme_color: "#0b1220"

# About — short paragraph rendered on the page
about: >
  I work on large-scale data systems — query engines, storage, and the messy
  middle where the two meet. I've spent years contributing to Apache Druid,
  Apache Hive, and Apache Calcite, and I'm drawn to gnarly performance
  problems and code that has to keep running at 3 a.m. Outside of computers,
  you'll find me on alpine granite, on a glacier, or skinning up something
  steep.

# Now — what I'm focused on right now (https://nownownow.com/about)
now:
  - "Working on distributed query execution and storage performance."
  - "Training for spring alpine objectives in the North Cascades."
  - "Skinning out as many spring corn laps as my legs allow."

# Projects shown on the page. Set `auto: true` to pull top public repos from GitHub
# at build time (requires the jekyll-github-metadata plugin, which GitHub Pages
# enables by default). When auto is false, the manual list below is used.
projects:
  auto: true
  count: 6
  # Pinned repo names to feature first when auto: true. Others fill remaining slots
  # by star count. Names must match the repo name exactly.
  featured:
    - druid
    - hive
    - calcite
  # Manual fallback list (used when auto: false or build cannot reach the API)
  manual:
    - name: "Apache Druid"
      url: "https://github.com/apache/druid"
      description: "High-performance real-time analytics database. Long-time contributor."
    - name: "Apache Hive"
      url: "https://github.com/apache/hive"
      description: "SQL data warehouse over distributed storage. Contributor focused on the query engine."
    - name: "Apache Calcite"
      url: "https://github.com/apache/calcite"
      description: "Dynamic data management framework — SQL parser, optimizer, and rules engine."

